<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 Thái Tử - Tìm du thuyền</title>

    <link rel="stylesheet" href="cruise.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="logo">
            <a href="index.html">
                <img src="images/logo.png" alt="Logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="flight.html">Tìm vé máy bay</a>
            <a href="train.html">Tìm vé tàu</a>
            <a href="cruise.html" class="active">Tìm du thuyền</a>
            <a href="about.html">Về chúng tôi</a>
            <a href="contact.html">Liên hệ</a>

        </nav>

    </header>

    <!-- ================= BODY ================= -->

    <main>

        <section class="banner">

            <img src="images/banner-cruise.png" alt="Banner">

            <div class="search-box">

                <h2>Tìm du thuyền</h2>

                <div class="ticket-type">

                    <label>
                        <input type="radio" name="trip" checked>
                        Trong ngày
                    </label>

                    <label>
                        <input type="radio" name="trip">
                        Nghỉ đêm
                    </label>

                </div>

                <div class="input-box">
                    <label>Khu vực</label>

                    <select>
                        <option>Vịnh Hạ Long</option>
                        <option>Vịnh Lan Hạ</option>
                        <option>Vịnh Bái Tử Long</option>
                        <option>Phú Quốc</option>
                        <option>Nha Trang</option>
                        <option>Sông Sài Gòn</option>
                        <option>Sông Hàn - Đà Nẵng</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Ngày khởi hành</label>
                    <input type="date">
                </div>

                <div class="input-box">
                    <label>Thời gian hành trình</label>

                    <select>
                        <option>1 ngày</option>
                        <option>2 ngày 1 đêm</option>
                        <option>3 ngày 2 đêm</option>
                        <option>4 ngày 3 đêm</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Loại phòng</label>

                    <select>
                        <option>Phòng Tiêu chuẩn</option>
                        <option>Phòng Deluxe</option>
                        <option>Phòng Suite</option>
                        <option>Phòng Gia đình</option>
                        <option>Phòng VIP</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Hãng du thuyền</label>

                    <select>
                        <option>Tất cả</option>
                        <option>Ambassador Cruise</option>
                        <option>Paradise Cruise</option>
                        <option>Heritage Cruise</option>
                        <option>Capella Cruise</option>
                        <option>Stellar of the Seas</option>
                    </select>
                </div>

                <div class="passenger">

                    <div class="person">

                        <label>Người lớn</label>

                        <div class="person-input">
                            <i class="fa-regular fa-user"></i>
                            <input type="number" value="2" min="1">
                        </div>

                    </div>

                    <div class="person">

                        <label>Trẻ em</label>

                        <div class="person-input">
                            <i class="fa-regular fa-user"></i>
                            <input type="number" value="0" min="0">
                        </div>

                    </div>

                </div>

                       <form action="cruise-result.html">
                        <button class="search-btn">
                            <i class="fa-solid fa-ship"></i>
                            Tìm du thuyền
                        </button>

                        </form>

                </div>

        </section>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <div class="footer-logo">

            <img src="images/logo.png" alt="Logo">

            <p>
                6 Thái Tử - Đồng hành cùng mọi chuyến đi.
            </p>

        </div>

        <div class="footer-menu">

            <h3>Liên kết</h3>

            <a href="index.html">Trang chủ</a>
            <a href="flight.html">Máy bay</a>
            <a href="cruise.html">Du thuyền</a>
            <a href="train.html">Vé tàu</a>

        </div>

        <div class="footer-contact">

            <h3>Liên hệ</h3>

            <p><i class="fa-solid fa-phone"></i> 0123 456 789</p>

            <p><i class="fa-solid fa-envelope"></i> support@6thaitu.vn</p>

            <p><i class="fa-solid fa-location-dot"></i> TP. Hồ Chí Minh</p>

        </div>

        <div class="footer-social">

            <h3>Theo dõi</h3>

            <a href="#"><i class="fa-brands fa-facebook"></i> Facebook</a><br><br>

            <a href="#"><i class="fa-brands fa-instagram"></i> Instagram</a><br><br>

            <a href="#"><i class="fa-brands fa-tiktok"></i> TikTok</a><br><br>

            <a href="#"><i class="fa-brands fa-youtube"></i> YouTube</a>

        </div>

    </footer>

</body>

</html>
